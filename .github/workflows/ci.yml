name: churn-imbalanced-dataset

on: [push]

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up CML
        uses: iterative/setup-cml@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # ✅ Versions compatibles pour éviter les conflits
          pip install dvc-objects==0.15.1
          pip install dvc-data==0.51.0
          pip install dvc==2.57.2
          pip install dvc[dags_hub]
          
          pip install -r requirements.txt
          
          dvc --version

      - name: Configure DVC Remote
        run: |
          dvc remote add -d myremote https://dagshub.com/Mouad-Dach/churn-cml-dvc.dvc 2>/dev/null || true
          dvc remote modify myremote --local auth basic
          dvc remote modify myremote --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify myremote --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data from DVC
        run: |
          dvc pull -v
          ls -la data/

      - name: Debug fichiers
        run: |
          pwd
          ls -la
          ls -la data/ || echo "data/ introuvable"

      - name: Train model
        run: python script.py

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Rapport MLOps - Churn Detection" > report.md
          echo "" >> report.md
          echo "### Metriques F1-Score" >> report.md
          echo '```' >> report.md
          cat metrics.txt >> report.md
          echo '```' >> report.md
          echo "" >> report.md
          echo "### Matrice de Confusion" >> report.md
          echo "![Confusion Matrix](./conf_matrix.png)" >> report.md
          cml comment create report.md